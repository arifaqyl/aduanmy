name: TrafficMY Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install -e .

      - name: Run snapshot
        run: python scripts/run_snapshot.py
        env:
          ADUANMY_AUTO_REFRESH_ENABLED: "false"

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trafficmy-snapshot
          path: data/reports/
          if-no-files-found: warn
          retention-days: 14

      # main is branch-protected (required "test" check). Push reports to an
      # unprotected ops branch instead so the scheduled job stops failing.
      - name: Publish reports branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin chore/snapshot || true
          git checkout -B chore/snapshot
          git add data/reports
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh trafficmy snapshot"
          git push -u origin chore/snapshot --force-with-lease
