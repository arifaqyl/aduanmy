name: TrafficMY Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Needed so github-actions[bot] can push the refreshed report commit.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install -e .

      - name: Run snapshot
        run: python scripts/run_snapshot.py
        env:
          # Keep CI snapshot offline-friendly: no live Threads scrape required.
          ADUANMY_AUTO_REFRESH_ENABLED: "false"

      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/reports
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh trafficmy snapshot"
          git push
