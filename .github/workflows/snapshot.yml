name: TrafficMY Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install -e .

      - name: Run snapshot
        run: python scripts/run_snapshot.py

      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/reports
          git diff --cached --quiet || git commit -m "chore: refresh trafficmy snapshot"
          git push
