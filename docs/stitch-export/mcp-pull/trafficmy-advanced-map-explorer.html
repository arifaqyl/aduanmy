<script>
        // Simple Interaction for Bottom Sheet
        let isSheetOpen = false;
        const sheet = document.getElementById('bottom-sheet');
        
        sheet.addEventListener('click', () => {
            if (!isSheetOpen) {
                sheet.style.transform = 'translateY(-60px)'; // Peek more
                isSheetOpen = true;
            } else {
                sheet.style.transform = 'translateY(80px)'; // Half open
                isSheetOpen = false;
            }
        });

        // Prevent clicking elements inside from triggering the toggle twice
        const sheetItems = sheet.querySelectorAll('button, a, input');
        sheetItems.forEach(item => {
            item.addEventListener('click', (e) => e.stopPropagation());
        });
    </script>
