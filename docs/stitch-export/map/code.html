<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Map UI interaction styles */
        .map-pin {
            transform-origin: bottom center;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .map-pin:active {
            transform: scale(0.8);
        }

        /* Custom Scrollbar for Filter Chips */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Neubrutalist Shadows */
        .chunky-shadow {
            box-shadow: 0 4px 0 0 #3f4a36;
        }
        .chunky-shadow-blue {
            box-shadow: 0 4px 0 0 #004c6e;
        }
        .chunky-shadow-red {
            box-shadow: 0 4px 0 0 #93000a;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-main selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface border-b-2 border-on-surface-variant shadow-[0_4px_0_0_#3f4a36] max-w-[420px] mx-auto left-0 right-0">
<div class="flex justify-between items-center h-touch-target-min px-page-margin">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="sensors">sensors</span>
<h1 class="font-display-logo text-display-logo text-primary-container">TrafficMY</h1>
</div>
<div class="flex items-center gap-md">
<div class="text-right">
<p class="font-timestamp text-timestamp text-ink-secondary uppercase">Last Update / Kemaskini</p>
<p class="font-label-small text-label-small text-on-surface">2m ago</p>
</div>
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center rounded-lg border-2 border-on-surface-variant hover:bg-surface-container-highest active:translate-y-1 active:shadow-none transition-all shadow-[0_3px_0_0_#3f4a36]">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
</button>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="relative pt-[48px] pb-[72px] h-screen max-w-[420px] mx-auto overflow-hidden">
<!-- Filter Bar -->
<div class="absolute top-[64px] left-0 right-0 z-40 px-page-margin">
<div class="flex gap-sm overflow-x-auto no-scrollbar py-2">
<!-- Reports Toggle (Active) -->
<button class="flex items-center gap-xs px-gap-md py-1 bg-secondary-container text-on-secondary-container border-2 border-on-secondary-fixed-variant rounded-full shadow-[0_4px_0_0_#004c6e] active:translate-y-1 active:shadow-none transition-all whitespace-nowrap">
<span class="material-symbols-outlined text-[18px]" data-icon="warning">warning</span>
<span class="font-label-action text-label-action">Reports / Laporan</span>
</button>
<!-- LRT Toggle -->
<button class="flex items-center gap-xs px-gap-md py-1 bg-surface border-2 border-on-surface-variant rounded-full shadow-[0_4px_0_0_#3f4a36] hover:bg-surface-container-highest active:translate-y-1 active:shadow-none transition-all whitespace-nowrap opacity-90">
<span class="material-symbols-outlined text-[18px]" data-icon="train">train</span>
<span class="font-label-action text-label-action">LRT</span>
</button>
<!-- MRT Toggle -->
<button class="flex items-center gap-xs px-gap-md py-1 bg-surface border-2 border-on-surface-variant rounded-full shadow-[0_4px_0_0_#3f4a36] hover:bg-surface-container-highest active:translate-y-1 active:shadow-none transition-all whitespace-nowrap opacity-90">
<span class="material-symbols-outlined text-[18px]" data-icon="subway">subway</span>
<span class="font-label-action text-label-action">MRT</span>
</button>
<!-- KTM Toggle -->
<button class="flex items-center gap-xs px-gap-md py-1 bg-surface border-2 border-on-surface-variant rounded-full shadow-[0_4px_0_0_#3f4a36] hover:bg-surface-container-highest active:translate-y-1 active:shadow-none transition-all whitespace-nowrap opacity-90">
<span class="material-symbols-outlined text-[18px]" data-icon="directions_railway">directions_railway</span>
<span class="font-label-action text-label-action">KTM</span>
</button>
</div>
</div>
<!-- Map Container -->
<div class="w-full h-full relative bg-surface-dim overflow-hidden" data-location="Kuala Lumpur" style="">
<!-- Simulated Dark Map Background -->
<div class="w-full h-full bg-cover bg-center" data-alt="A stylized dark mode transit map of Kuala Lumpur with glowing neon transit lines in red, orange, and green. The background is a deep charcoal grey with simplified city blocks. Subtle glowing dots represent stations. The aesthetic is clean, tactical, and high-contrast, matching a modern commuter app interface." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDfCVk13J47ezDSmvgqAPow_-yRKSiUP2BQZd8ZiEeamkHZtpaajnmVIh8RAwglzSyZrVcrKUyhrMybYk5uHdV3H3u7r_YwpYmiGdlOjIKFzZ5AxuImEn6HCpYpjWPBU4_mz_kbo3kbeEXpHvX9OlYcP_iCgu4mh4Z6vzu-koxhGKsQWS3N8exFgon7dWXWoKxDjM2QZkJkc3cRpPFKKPE1aClOZ-M0KTQU3-0g8ZREkJE5nkeMVVFBJwal_RF40HcBtTI6QDai8ToJ')">
</div>
<!-- Line Geometry Overlays (SVG) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" viewbox="0 0 420 800" xmlns="http://www.w3.org/2000/svg">
<!-- Kelana Jaya Line -->
<path class="opacity-80" d="M50 700 L120 600 L200 550 L250 400 L300 200" fill="none" stroke="#E31837" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"></path>
<!-- Ampang Line -->
<path class="opacity-80" d="M380 650 L300 580 L200 550 L150 450 L100 300" fill="none" stroke="#F7941D" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"></path>
</svg>
<!-- Map Pins (Interactive) -->
<!-- Report Pin 1 -->
<div class="absolute top-[400px] left-[250px] map-pin cursor-pointer group">
<div class="relative flex flex-col items-center">
<div class="bg-status-critical border-2 border-status-critical-dark w-10 h-10 rounded-full flex items-center justify-center shadow-[0_4px_0_0_#93000a] text-white">
<span class="material-symbols-outlined text-[20px]" data-icon="report" style="font-variation-settings: 'FILL' 1;">report</span>
</div>
<div class="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-status-critical-dark"></div>
</div>
</div>
<!-- Report Pin 2 -->
<div class="absolute top-[550px] left-[200px] map-pin cursor-pointer group">
<div class="relative flex flex-col items-center">
<div class="bg-tertiary-container border-2 border-tertiary text-on-tertiary-container w-10 h-10 rounded-full flex items-center justify-center shadow-[0_4px_0_0_#6a3b00]">
<span class="material-symbols-outlined text-[20px]" data-icon="warning" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<div class="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-tertiary"></div>
</div>
</div>
<!-- Bus GPS Pin -->
<div class="absolute top-[320px] left-[120px] map-pin cursor-pointer opacity-80">
<div class="relative flex flex-col items-center">
<div class="bg-secondary-container border-2 border-on-secondary-fixed-variant text-on-secondary-container w-8 h-8 rounded-lg flex items-center justify-center shadow-[0_3px_0_0_#004c6e]">
<span class="material-symbols-outlined text-[16px]" data-icon="directions_bus" style="font-variation-settings: 'FILL' 1;">directions_bus</span>
</div>
</div>
</div>
<!-- Floating Line Info Card -->
<div class="absolute bottom-page-margin left-page-margin right-page-margin z-40">
<div class="bg-surface border-2 border-on-surface-variant rounded-xl p-gap-lg shadow-[0_4px_0_0_#3f4a36] animate-in slide-in-from-bottom duration-300">
<div class="flex items-center justify-between mb-gap-md">
<div class="flex items-center gap-md">
<div class="w-2 h-10 bg-line-kelana rounded-full"></div>
<div>
<h3 class="font-headline-card-mobile text-headline-card-mobile">Kelana Jaya Line</h3>
<p class="font-caption text-caption text-ink-secondary">2 Reports Today / Laporan Hari Ini</p>
</div>
</div>
<div class="flex flex-col items-end">
<span class="bg-error-container text-on-error-container px-gap-sm py-0.5 rounded-full border-2 border-error font-micro-tag text-micro-tag uppercase mb-1">
                                DELAY / LEWAT
                            </span>
<p class="font-timestamp text-timestamp text-error">Est. +12m</p>
</div>
</div>
<div class="flex gap-sm">
<button class="flex-1 py-gap-sm bg-surface-variant border-2 border-on-surface-variant rounded-lg font-label-action text-label-action chunky-shadow active:translate-y-1 active:shadow-none transition-all">
                            Details / Perincian
                        </button>
<button class="flex-1 py-gap-sm bg-primary-container text-on-primary-container border-2 border-on-primary-fixed-variant rounded-lg font-label-action text-label-action shadow-[0_4px_0_0_#1f5100] active:translate-y-1 active:shadow-none transition-all">
                            Plan Route / Rancang
                        </button>
</div>
</div>
</div>
</div>
<!-- FAB for Adding Reports -->
<button class="absolute bottom-[88px] right-page-margin z-50 w-14 h-14 bg-status-critical border-2 border-status-critical-dark text-white rounded-full flex items-center justify-center shadow-[0_5px_0_0_#93000a] active:translate-y-1 active:shadow-none transition-all">
<span class="material-symbols-outlined text-[32px]" data-icon="add_comment">add_comment</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-surface border-t-2 border-on-surface-variant max-w-[420px] mx-auto left-0 right-0 rounded-t-xl">
<div class="flex justify-around items-center h-[72px] px-page-margin bg-surface">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 active:scale-95 transition-transform duration-100" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-small text-label-small">Home/Utama</span>
</a>
<!-- Map (Active) -->
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-gap-lg py-1 border-2 border-on-secondary-fixed-variant shadow-[0_4px_0_0_#004c6e] active:scale-95 transition-transform duration-100" href="#">
<span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-label-small text-label-small">Map/Peta</span>
</a>
<!-- Travel -->
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 active:scale-95 transition-transform duration-100" href="#">
<span class="material-symbols-outlined" data-icon="directions_transit">directions_transit</span>
<span class="font-label-small text-label-small">Travel/Perjalanan</span>
</a>
</div>
</nav>
<script>
        // Micro-interactions for pins and filters
        document.querySelectorAll('.map-pin').forEach(pin => {
            pin.addEventListener('click', () => {
                // Shake animation on click
                pin.classList.add('animate-bounce');
                setTimeout(() => pin.classList.remove('animate-bounce'), 1000);
            });
        });

        // Filter toggle simulation
        const filterButtons = document.querySelectorAll('.no-scrollbar button');
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                // If not already active
                if(!btn.classList.contains('bg-secondary-container')) {
                    // Reset all
                    filterButtons.forEach(b => {
                        b.className = 'flex items-center gap-xs px-gap-md py-1 bg-surface border-2 border-on-surface-variant rounded-full shadow-[0_4px_0_0_#3f4a36] hover:bg-surface-container-highest active:translate-y-1 active:shadow-none transition-all whitespace-nowrap opacity-90';
                    });
                    // Set active
                    btn.className = 'flex items-center gap-xs px-gap-md py-1 bg-secondary-container text-on-secondary-container border-2 border-on-secondary-fixed-variant rounded-full shadow-[0_4px_0_0_#004c6e] active:translate-y-1 active:shadow-none transition-all whitespace-nowrap';
                }
            });
        });
    </script>
</body></html>
